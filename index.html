<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie Chat Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: url('your-background.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(8px);
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      color: white;
    }

    .glass {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      flex-grow: 1;
    }

    .clock {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 1.2rem;
      color: #fff;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 12px;
    }
  </style>
</head>
<body>

  <div class="clock" id="clock"></div>

  <div class="grid">
    <!-- Google Calendar -->
    <div class="glass">
      <h2>📅 Calendar</h2>
      <iframe src="https://calendar.google.com/calendar/embed?src=steven%40salientfusion.com&ctz=Asia%2FKuala_Lumpur"></iframe>
    </div>

    <!-- Google Tasks (TasksBoard) -->
    <div class="glass">
      <h2>✅ Tasks</h2>
      <iframe src="https://tasksboard.com/app" style="height: 400px;"></iframe>
    </div>

    <!-- Tasks Completed Today -->
    <div class="glass">
      <h2>📌 Tasks Completed Today</h2>
      <p>To be filled via automation or sync.</p>
    </div>

    <!-- Focus Timer -->
    <div class="glass">
      <h2>⏳ Focus Timer</h2>
      <p>Coming soon: Pomodoro or custom timer.</p>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
