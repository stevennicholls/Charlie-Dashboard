<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Productivity Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background-color: #4a90e2;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .tile {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      flex: 1 1 300px;
      max-width: 400px;
    }

    .tile h2 {
      margin-top: 0;
    }

    ul {
      padding-left: 20px;
    }

    /* Weather widget styling */
    #weather-widget {
      width: 100%;
      max-width: 800px;
      margin: 20px auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>My Dashboard</h1>
  </header>

  <!-- Weather section -->
  <section id="weather-widget">
    <!-- widget inserted by system -->
  </section>

  <main class="dashboard">
    <div class="tile" id="tasks-tile">
      <h2>✅ Tasks</h2>
      <ul id="taskList">
        <li>Loading tasks...</li>
      </ul>
    </div>

    <div class="tile" id="projects-tile">
      <h2>📁 Projects</h2>
      <ul id="projectList">
        <li>Loading projects...</li>
      </ul>
    </div>

    <div class="tile" id="calendar-tile">
      <h2>📅 Calendar</h2>
      <div id="calendar">[Your calendar will go here]</div>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tasks = ['Email client', 'Submit report', 'Plan meeting'];
      const projects = ['Website Redesign', 'Q3 Launch Prep', 'Mobile App Update'];

      const taskList = document.getElementById('taskList');
      const projectList = document.getElementById('projectList');

      // Load tasks
      taskList.innerHTML = '';
      tasks.forEach(task => {
        const li = document.createElement('li');
        li.textContent = task;
        taskList.appendChild(li);
      });

      // Load projects
      projectList.innerHTML = '';
      projects.forEach(project => {
        const li = document.createElement('li');
        li.textContent = project;
        projectList.appendChild(li);
      });
    });
  </script>
</body>
</html>
