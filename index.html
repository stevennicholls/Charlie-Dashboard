<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charlie Daily Dashboard</title>
  <style>
    /* ==== Global Styles ==== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f5f5;
      position: relative;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    /* ==== Top Bar ==== */
    .top-bar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    #clockDisplay {
      color: #333;
    }

    /* ==== Weather Widget ==== */
    #weatherWidget {
      text-align: center;
    }
    
    /* ==== Focus Timer (Basic Responsive Sizing) ==== */
    .focus-timer {
      background: #c44b4b;
      color: #fff;
      text-align: center;
      border-radius: 1rem;
      padding: 1.5rem;
    }
    .focus-timer button {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* ==== Background Image ==== */
    .background-image {
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      width: 100vw;
      background-image: url('your-image.jpg'); /* replace */
      background-size: cover;
      background-position: center;
      opacity: 0.08;
      z-index: -1;
    }

    @media (max-width: 600px) {
      .focus-timer {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <!-- Background Image -->
  <div class="background-image"></div>

  <!-- Top Clock Bar -->
  <div class="top-bar">
    <div id="clockDisplay"></div>
  </div>

  <!-- Dashboard Grid -->
  <div class="container">

    <!-- Google Calendar Widget -->
    <div class="glass">
      <h2>
