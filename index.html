<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Daily Dashboard</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f9f9f9;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>
  <h1>📆 Daily Dashboard</h1>
  <div class="grid">
    <div class="card">
      <h2>📅 Google Calendar</h2>
      <iframe src="https://calendar.google.com/calendar/embed?src=steven@salientfusion.com"
              style="border:0" width="100%" height="400" frameborder="0" scrolling="no"></iframe>
    </div>
    <div class="card">
      <h2>✅ Google Tasks</h2>
      <p>Embed or link your task view here.</p>
    </div>
    <div class="card">
      <h2>📌 Charlie’s Project Updates</h2>
      <p>This can pull from Notion, Google Sheets, or an email summary.</p>
    </div>
  </div>
</body>
</html>

<div class="card">
  <h2>🌤 Weather</h2>
  <a class="weatherwidget-io" href="https://forecast7.com/en/51d51n0d13/london/" 
     data-label_1="LONDON" data-label_2="WEATHER" data-theme="pure">LONDON WEATHER</a>
  <script>
    !function(d,s,id){
      var js, fjs = d.getElementsByTagName(s)[0];
      if(!d.getElementById(id)){
        js = d.createElement(s);
        js.id = id;
        js.src = 'https://weatherwidget.io/js/widget.min.js';
        fjs.parentNode.insertBefore(js,fjs);
      }
    }(document,'script','weatherwidget-io-js');
  </script>
</div>

<div class="card">
  <h2>⏱ Focus Timer</h2>
  <iframe src="https://pomofocus.io" width="100%" height="500" frameborder="0"></iframe>
</div>
