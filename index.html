<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Productivity Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: #f0f2f5;
      color: #333;
    }
    header {
      background-color: #4a90e2;
      color: white;
      padding: 20px;
      text-align: center;
    }
    #weather-widget {
      max-width: 800px;
      margin: 20px auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
    }

    #weather-widget h2 {
      margin-top: 0;
      font-size: 1.2em;
    }

    .weather-day {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
    }

    .dashboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
      gap: 20px;
    }

    .tile {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      flex: 1 1 300px;
      max-width: 400px;
    }

    .tile h2 {
      margin-top: 0;
    }

    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="logo">Dashboard</div>
  </header>

  <section id="weather-widget">
    <h2>🌤️ 7‑Day Forecast</h2>
    <div id="weatherDays">Loading weather...</div>
  </section>

  <main class="dashboard">
    <div class="tile"><h2>✅ Tasks</h2><ul id="taskList"><li>Loading tasks...</li></ul></div>
    <div class="tile"><h2>📁 Projects</h2><ul id="projectList"><li>Loading projects...</li></ul></div>
    <div class="tile"><h2>📅 Calendar</h2><div id="calendar">[Your calendar will go here]</div></div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ['Email client', 'Submit report', 'Plan meeting']
        .forEach(task => document.getElementById('taskList')
        .appendChild(Object.assign(document.createElement('li'), { textContent: task })));

      ['Website Redesign', 'Q3 Launch Prep', 'Mobile App Update']
        .forEach(proj => document.getElementById('projectList')
        .appendChild(Object.assign(document.createElement('li'), { textContent: proj })));

      // Dummy weather data
      const dummyWeather = [
        { dt: Date.now() / 1000, description: "sunny", max: 30, min: 22 },
        { dt: Date.now() / 1000 + 86400, description: "cloudy", max: 28, min: 21 },
        { dt: Date.now() / 1000 + 86400*2, description: "rainy", max: 26, min: 20 },
      ];

      const container = document.getElementById('weatherDays');
      container.innerHTML = '';
      dummyWeather.forEach(day => {
        const date = new Date(day.dt * 1000).toLocaleDateString();
        const el = document.createElement('div');
        el.className = 'weather-day';
        el.textContent = `${date}: ${day.description}, High ${day.max}°C / Low ${day.min}°C`;
        container.appendChild(el);
      });
    });
  </script>
</body>
</html>
