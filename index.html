<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie’s Daily Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', sans-serif;
      background: url('background.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #111;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem 0 2rem;
      color: #fff;
    }

    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }

    #clock {
      font-size: 1.2rem;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    .glass-container {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 1.5rem;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    iframe {
      border: none;
      width: 100%;
      height: 600px;
      border-radius: 12px;
    }

    .focus-timer {
      text-align: center;
    }

    .focus-timer button {
      padding: 0.6rem 1.2rem;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background-color: #fff;
      color: #333;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
        padding: 1rem;
      }

      iframe {
        height: 500px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Charlie’s Daily Dashboard</h1>
    <div id="clock"></div>
  </header>

  <main class="dashboard">
    <!-- ✅ Google Tasks -->
    <div class="glass-container">
      <h2>✅ Google Tasks</h2>
      <iframe src="https://tasksboard.com/app" allowfullscreen></iframe>
    </div>

    <!-- 📅 Google Calendar -->
    <div class="glass-container">
      <h2>📅 Google Calendar</h2>
      <iframe src="https://calendar.google.com/calendar/embed?src=steven%40salientfusion.com&ctz=Asia%2FKuala_Lumpur" scrolling="no"></iframe>
    </div>

    <!-- ⏱️ Focus Timer -->
    <div class="glass-container">
      <h2>⏱️ Focus Timer</h2>
      <div class="focus-timer">
        <div id="timer-display">25:00</div>
        <button onclick="toggleTimer()" id="startStopBtn">Start</button>
      </div>
    </div>
  </main>

  <script>
    // Live Clock
    setInterval(() => {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString();
    }, 1000);

    // Focus Timer Logic
    let timer;
    let minutes = 25;
    let seconds = 0;
    let isRunning = false;

    function updateDisplay() {
      const min = String(minutes).padStart(2, '0');
      const sec = String(seconds).padStart(2, '0');
      document.getElementById('timer-display').textContent = `${min}:${sec}`;
    }

    function toggleTimer() {
      if (isRunning) {
        clearInterval(timer);
        isRunning = false;
        document.getElementById('startStopBtn').textContent = 'Start';
      } else {
        timer = setInterval(() => {
          if (seconds === 0) {
            if (minutes === 0) {
              clearInterval(timer);
              alert("Time's up!");
              return;
            }
            minutes--;
            seconds = 59;
          } else {
            seconds--;
          }
          updateDisplay();
        }, 1000);
        isRunning = true;
        document.getElementById('startStopBtn').textContent = 'Pause';
      }
    }

    updateDisplay();
  </script>
</body>
</html>
