<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Charlie Chat Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: url('your-background.jpg') no-repeat center center fixed;
      background-size: cover;
      backdrop-filter: blur(6px);
      height: 100vh;
      padding: 20px;
      color: white;
      display: flex;
      flex-direction: column;
    }

    .clock {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 1.2rem;
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-top: 60px;
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      height: 100%;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
      border-radius: 12px;
    }

    h2 {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <!-- Live Clock -->
  <div class="clock" id="clock"></div>

  <!-- Dashboard Grid -->
  <div class="grid">

    <!-- Google Calendar -->
    <div class="glass" id="calendar-container">
      <h2>📅 Calendar</h2>
      <iframe src="https://calendar.google.com/calendar/embed?src=steven%40salientfusion.com&ctz=Asia%2FKuala_Lumpur" allowfullscreen></iframe>
    </div>

    <!-- Tasks (Google Sheets) -->
    <div class="glass" id="tasks-container">
      <h2>✅ Tasks</h2>
      <div id="task-list">Loading tasks...</div>
    </div>

    <!-- Completed Tasks -->
    <div class="glass" id="completed-tasks-container">
      <h2>📌 Completed Today</h2>
      <div id="completed-list">Awaiting data...</div>
    </div>

    <!-- Focus Timer -->
    <div class="glass" id="focus-timer">
      <h2>⏳ Focus Timer</h2>
      <p>Timer coming soon...</p>
    </div>

    <!-- Weather -->
    <div class="glass" id="weather-widget">
      <h2>🌤️ Weather</h2>
      <p>Weather integration in progress...</p>
    </div>

  </div>

  <!-- JS: Live Clock -->
  <script>
    function updateClock() {
      const now = new Date();
      const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('clock').textContent = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
